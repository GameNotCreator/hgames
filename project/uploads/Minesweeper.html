<!DOCTYPE html><html lang="en"><head>


<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINESWEEPER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&amp;family=Share+Tech+Mono&amp;display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --border: #252a35;
    --cell-hidden: #1e2330;
    --cell-hover: #252d40;
    --cell-revealed: #111419;
    --cell-border-light: #2e3548;
    --cell-border-dark: #0a0c10;
    --amber: #f0a500;
    --amber-dim: #7a5200;
    --red: #e03c3c;
    --green: #2ecc71;
    --blue: #4a9eff;
    --text-primary: #e8eaf0;
    --text-dim: #4a5068;
    --flag: #e03c3c;
    --mine: #e8eaf0;
    --display-bg: #080a0e;
    --display-glow: rgba(240,165,0,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-primary);
    overflow: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  #root {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  /* ── Title ── */
  .title {
    letter-spacing: 0.3em;
    font-size: 11px;
    font-weight: 700;
    color: var(--amber);
    text-transform: uppercase;
    opacity: 0.7;
  }

  /* ── Difficulty tabs ── */
  .diff-tabs {
    display: flex;
    gap: 2px;
    background: var(--display-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px;
  }
  .diff-tab {
    padding: 5px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
    color: var(--text-dim);
  }
  .diff-tab:hover { color: var(--text-primary); background: var(--border); }
  .diff-tab.active { background: var(--amber); color: #000; }

  /* ── Game panel ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04),
      0 24px 60px rgba(0,0,0,0.6),
      0 0 80px rgba(240,165,0,0.03);
  }

  /* ── HUD ── */
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--display-bg);
  }

  .lcd {
    display: flex;
    gap: 3px;
    align-items: center;
  }
  .lcd-digit {
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    line-height: 1;
    color: var(--amber);
    text-shadow: 0 0 12px var(--amber), 0 0 4px var(--amber);
    min-width: 22px;
    text-align: center;
  }
  .lcd-icon {
    font-size: 14px;
    margin-right: 6px;
    opacity: 0.5;
  }

  .reset-btn {
    width: 40px;
    height: 40px;
    background: var(--cell-hidden);
    border: 1px solid var(--cell-border-light);
    border-radius: 6px;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
    user-select: none;
  }
  .reset-btn:hover { background: var(--cell-hover); transform: scale(1.05); }
  .reset-btn:active { transform: scale(0.95); }

  /* ── Grid ── */
  .grid-wrap {
    padding: 14px;
    user-select: none;
  }

  .grid {
    display: grid;
    gap: 2px;
  }

  /* ── Cell ── */
  .cell {
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
    border-radius: 3px;
    transition: background 0.08s, transform 0.08s;
    position: relative;
    border: 1px solid transparent;
  }

  .cell.hidden {
    background: var(--cell-hidden);
    border-color: var(--cell-border-light);
    box-shadow: inset 1px 1px 0 rgba(255,255,255,0.05), inset -1px -1px 0 rgba(0,0,0,0.3);
  }
  .cell.hidden:hover { background: var(--cell-hover); cursor: pointer; }
  .cell.hidden:active { transform: scale(0.92); }

  .cell.revealed {
    background: var(--cell-revealed);
    border-color: var(--cell-border-dark);
    cursor: default;
  }

  .cell.flagged {
    background: var(--cell-hidden);
    border-color: var(--cell-border-light);
  }

  .cell.mine-hit {
    background: #3d1010 !important;
    border-color: var(--red) !important;
  }
  .cell.mine-shown {
    background: #1a1010;
    border-color: #2a1515;
  }
  .cell.wrong-flag {
    background: #2a1010;
  }

  /* Number colors */
  .n1 { color: #4a9eff; }
  .n2 { color: #2ecc71; }
  .n3 { color: #e03c3c; }
  .n4 { color: #9b59b6; }
  .n5 { color: #e67e22; }
  .n6 { color: #1abc9c; }
  .n7 { color: #e8eaf0; }
  .n8 { color: var(--text-dim); }

  .flag-emoji { font-size: 13px; }
  .mine-emoji { font-size: 13px; }

  /* ── Overlay ── */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(13,15,20,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 10;
    border-radius: 10px;
    backdrop-filter: blur(4px);
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .overlay-title {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .overlay-title.win { color: var(--amber); text-shadow: 0 0 20px var(--amber); }
  .overlay-title.lose { color: var(--red); text-shadow: 0 0 20px var(--red); }

  .overlay-sub {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .overlay-btn {
    margin-top: 8px;
    padding: 10px 28px;
    background: var(--amber);
    color: #000;
    border: none;
    border-radius: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .overlay-btn:hover { opacity: 0.85; transform: scale(1.04); }

  /* ── Cell reveal animation ── */
  @keyframes pop-in {
    0% { transform: scale(0.7); opacity: 0; }
    60% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }
  .cell.just-revealed {
    animation: pop-in 0.18s ease forwards;
  }

  /* ── Tweaks Panel ── */
  .tweaks-panel {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    width: 200px;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    font-size: 11px;
  }
  .tweaks-title {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 12px;
    font-weight: 700;
  }
  .tweak-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    color: var(--text-dim);
  }
  .tweak-label { letter-spacing: 0.05em; }
  .tweak-toggle {
    width: 32px; height: 18px;
    background: var(--border);
    border-radius: 9px;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    border: none;
    flex-shrink: 0;
  }
  .tweak-toggle.on { background: var(--amber); }
  .tweak-toggle::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    background: #fff;
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: transform 0.2s;
  }
  .tweak-toggle.on::after { transform: translateX(14px); }

  .cell-size-slider {
    width: 80px;
    accent-color: var(--amber);
  }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    gap: 20px;
    padding: 8px 18px;
    border-top: 1px solid var(--border);
    background: var(--display-bg);
  }
  .stat {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    display: flex;
    gap: 6px;
  }
  .stat span { color: var(--text-primary); }
</style>

<script type="text/babel" data-plugins="transform-react-jsx-source" data-filename="inline-0">

const { useState, useEffect, useCallback, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "questionMark": true,
  "cellSize": 30,
  "showCoords": false
} /*EDITMODE-END*/;

const DIFFICULTIES = {
  beginner: { label: 'Beginner', cols: 9, rows: 9, mines: 10 },
  intermediate: { label: 'Intermediate', cols: 16, rows: 16, mines: 40 },
  expert: { label: 'Expert', cols: 30, rows: 16, mines: 99 }
};

const NUM_COLORS = ['', 'n1', 'n2', 'n3', 'n4', 'n5', 'n6', 'n7', 'n8'];

function makeCells(rows, cols) {
  return Array.from({ length: rows * cols }, (_, i) => ({
    id: i,
    row: Math.floor(i / cols),
    col: i % cols,
    mine: false,
    revealed: false,
    flagged: false,
    questioned: false,
    count: 0,
    justRevealed: false,
    hitMine: false
  }));
}

function placeMines(cells, rows, cols, mines, safeIdx) {
  const next = cells.map((c) => ({ ...c }));
  const candidates = next.map((c) => c.id).filter((id) => id !== safeIdx);
  // shuffle
  for (let i = candidates.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
  }
  const mineSet = new Set(candidates.slice(0, mines));
  next.forEach((c) => {if (mineSet.has(c.id)) c.mine = true;});
  // compute counts
  next.forEach((c) => {
    if (c.mine) return;
    c.count = getNeighborIds(c.row, c.col, rows, cols).
    filter((nid) => next[nid].mine).length;
  });
  return next;
}

function getNeighborIds(row, col, rows, cols) {
  const ids = [];
  for (let dr = -1; dr <= 1; dr++)
  for (let dc = -1; dc <= 1; dc++) {
    if (dr === 0 && dc === 0) continue;
    const r = row + dr,c = col + dc;
    if (r >= 0 && r < rows && c >= 0 && c < cols)
    ids.push(r * cols + c);
  }
  return ids;
}

function floodReveal(cells, startId, rows, cols) {
  const next = cells.map((c) => ({ ...c }));
  const queue = [startId];
  const visited = new Set();
  while (queue.length) {
    const id = queue.shift();
    if (visited.has(id)) continue;
    visited.add(id);
    const cell = next[id];
    if (cell.flagged || cell.revealed) continue;
    cell.revealed = true;
    cell.justRevealed = true;
    if (cell.count === 0 && !cell.mine) {
      getNeighborIds(cell.row, cell.col, rows, cols).
      forEach((nid) => {if (!visited.has(nid)) queue.push(nid);});
    }
  }
  return next;
}

function checkWin(cells, mines) {
  const hidden = cells.filter((c) => !c.revealed);
  return hidden.length === mines && hidden.every((c) => c.mine);
}

function formatTime(s) {
  const mm = String(Math.floor(s / 60)).padStart(2, '0');
  const ss = String(s % 60).padStart(2, '0');
  return `${mm}:${ss}`;
}

// ── LCD Display ──
function LCD({ value, icon }) {
  const str = String(Math.max(0, Math.min(999, value))).padStart(3, '0');
  return (
    <div className="lcd">
      {icon && <span className="lcd-icon">{icon}</span>}
      {str.split('').map((d, i) =>
      <span key={i} className="lcd-digit">{d}</span>
      )}
    </div>);

}

// ── Main App ──
function App() {
  const [tweaks, setTweaks] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('ms-tweaks') || '{}');
      return { ...TWEAK_DEFAULTS, ...saved };
    } catch {return TWEAK_DEFAULTS;}
  });
  const [showTweaks, setShowTweaks] = useState(false);
  const [difficulty, setDifficulty] = useState(() =>
  localStorage.getItem('ms-diff') || 'beginner'
  );
  const [cells, setCells] = useState(() => makeCells(9, 9));
  const [gameState, setGameState] = useState('idle'); // idle | playing | won | lost
  const [minesLeft, setMinesLeft] = useState(10);
  const [time, setTime] = useState(0);
  const [totalMoves, setTotalMoves] = useState(0);
  const [bestTimes, setBestTimes] = useState(() => {
    try {return JSON.parse(localStorage.getItem('ms-best') || '{}');} catch {return {};}
  });
  const timerRef = useRef(null);
  const { rows, cols, mines } = DIFFICULTIES[difficulty];
  const cellSize = tweaks.cellSize;

  // Restore game state
  useEffect(() => {
    const saved = localStorage.getItem('ms-game');
    if (saved) {
      try {
        const s = JSON.parse(saved);
        if (s.difficulty === difficulty) {
          setCells(s.cells);
          setGameState(s.gameState);
          setMinesLeft(s.minesLeft);
          setTime(s.time);
          setTotalMoves(s.totalMoves || 0);
        } else {resetGame(difficulty);}
      } catch {resetGame(difficulty);}
    } else {resetGame(difficulty);}
  }, []);

  // Save game state
  useEffect(() => {
    if (gameState === 'idle' || gameState === 'playing') {
      localStorage.setItem('ms-game', JSON.stringify({
        difficulty, cells, gameState, minesLeft, time, totalMoves
      }));
    }
  }, [cells, gameState, minesLeft, time]);

  // Timer
  useEffect(() => {
    clearInterval(timerRef.current);
    if (gameState === 'playing') {
      timerRef.current = setInterval(() => setTime((t) => t + 1), 1000);
    }
    return () => clearInterval(timerRef.current);
  }, [gameState]);

  const resetGame = useCallback((diff = difficulty) => {
    clearInterval(timerRef.current);
    const d = DIFFICULTIES[diff];
    setCells(makeCells(d.rows, d.cols));
    setGameState('idle');
    setMinesLeft(d.mines);
    setTime(0);
    setTotalMoves(0);
    localStorage.removeItem('ms-game');
  }, [difficulty]);

  const changeDifficulty = (d) => {
    setDifficulty(d);
    localStorage.setItem('ms-diff', d);
    clearInterval(timerRef.current);
    const { rows, cols, mines } = DIFFICULTIES[d];
    setCells(makeCells(rows, cols));
    setGameState('idle');
    setMinesLeft(mines);
    setTime(0);
    setTotalMoves(0);
    localStorage.removeItem('ms-game');
  };

  const handleReveal = (id) => {
    if (gameState === 'won' || gameState === 'lost') return;
    const cell = cells[id];
    if (cell.revealed || cell.flagged) return;

    let next = [...cells];
    let state = gameState;

    if (gameState === 'idle') {
      // place mines avoiding first click
      next = placeMines(next, rows, cols, mines, id);
      state = 'playing';
      setGameState('playing');
    }

    const c = next[id];
    if (c.mine) {
      // boom!
      const exploded = next.map((cell) => {
        const copy = { ...cell };
        if (copy.mine && !copy.flagged) copy.revealed = true;
        if (copy.id === id) copy.hitMine = true;
        if (copy.flagged && !copy.mine) copy.wrongFlag = true;
        return copy;
      });
      setCells(exploded);
      setGameState('lost');
      return;
    }

    next = floodReveal(next, id, rows, cols);
    setTotalMoves((m) => m + 1);

    if (checkWin(next, mines)) {
      const flagged = next.map((c) => c.mine ? { ...c, flagged: true } : c);
      setCells(flagged);
      setMinesLeft(0);
      setGameState('won');
      // best time
      if (!bestTimes[difficulty] || time < bestTimes[difficulty]) {
        const nb = { ...bestTimes, [difficulty]: time };
        setBestTimes(nb);
        localStorage.setItem('ms-best', JSON.stringify(nb));
      }
    } else {
      setCells(next);
      if (state === 'idle') setGameState('playing');
    }
  };

  const handleFlag = (e, id) => {
    e.preventDefault();
    if (gameState === 'won' || gameState === 'lost') return;
    const cell = cells[id];
    if (cell.revealed) return;

    const next = cells.map((c) => {
      if (c.id !== id) return c;
      if (!c.flagged && !c.questioned) {
        return { ...c, flagged: true, questioned: false };
      } else if (c.flagged) {
        if (tweaks.questionMark) return { ...c, flagged: false, questioned: true };
        return { ...c, flagged: false, questioned: false };
      } else {
        return { ...c, flagged: false, questioned: false };
      }
    });
    const flagCount = next.filter((c) => c.flagged).length;
    setMinesLeft(mines - flagCount);
    setCells(next);
  };

  const handleChord = (id) => {
    // reveal neighbors if flagged count matches number
    if (gameState !== 'playing') return;
    const cell = cells[id];
    if (!cell.revealed || cell.count === 0) return;
    const neighborIds = getNeighborIds(cell.row, cell.col, rows, cols);
    const flaggedCount = neighborIds.filter((nid) => cells[nid].flagged).length;
    if (flaggedCount !== cell.count) return;

    let next = [...cells];
    let exploded = false;
    neighborIds.forEach((nid) => {
      const n = next[nid];
      if (!n.revealed && !n.flagged) {
        if (n.mine) exploded = true;
        next = floodReveal(next, nid, rows, cols);
      }
    });

    if (exploded) {
      const final = next.map((cell) => {
        const copy = { ...cell };
        if (copy.mine && !copy.flagged) copy.revealed = true;
        return copy;
      });
      setCells(final);
      setGameState('lost');
      return;
    }

    setTotalMoves((m) => m + 1);
    if (checkWin(next, mines)) {
      const flagged = next.map((c) => c.mine ? { ...c, flagged: true } : c);
      setCells(flagged);
      setMinesLeft(0);
      setGameState('won');
    } else {
      setCells(next);
    }
  };

  // Tweaks messaging
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    localStorage.setItem('ms-tweaks', JSON.stringify(next));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  const face = gameState === 'won' ? '😎' : gameState === 'lost' ? '💀' : '🙂';

  const best = bestTimes[difficulty];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 16 }}>
      <div className="title" style={{ color: "rgb(0, 0, 0)" }}>⬛ Minesweeper</div>

      <div className="diff-tabs">
        {Object.entries(DIFFICULTIES).map(([key, d]) =>
        <button
          key={key}
          className={`diff-tab ${difficulty === key ? 'active' : ''}`}
          onClick={() => changeDifficulty(key)}>
          {d.label}</button>
        )}
      </div>

      <div className="panel" style={{ position: 'relative' }}>
        {/* HUD */}
        <div className="hud">
          <LCD value={minesLeft} icon="💣" />
          <button className="reset-btn" onClick={() => resetGame(difficulty)}>{face}</button>
          <LCD value={time} icon="⏱" />
        </div>

        {/* Grid */}
        <div className="grid-wrap">
          <div
            className="grid"
            style={{
              gridTemplateColumns: `repeat(${cols}, ${cellSize}px)`,
              gridTemplateRows: `repeat(${rows}, ${cellSize}px)`,
              gap: 2
            }}>
            
            {cells.map((cell) =>
            <Cell
              key={cell.id}
              cell={cell}
              size={cellSize}
              showCoords={tweaks.showCoords}
              onReveal={() => handleReveal(cell.id)}
              onFlag={(e) => handleFlag(e, cell.id)}
              onChord={() => handleChord(cell.id)} />

            )}
          </div>
        </div>

        {/* Stats */}
        <div className="stats-bar">
          <div className="stat">Moves <span>{totalMoves}</span></div>
          {best !== undefined && <div className="stat">Best <span>{formatTime(best)}</span></div>}
          <div className="stat">Mines <span>{mines}</span></div>
        </div>

        {/* Overlay */}
        {(gameState === 'won' || gameState === 'lost') &&
        <div className="overlay">
            <div className={`overlay-title ${gameState === 'won' ? 'win' : 'lose'}`}>
              {gameState === 'won' ? '✦ You Win ✦' : '✕ Game Over'}
            </div>
            <div className="overlay-sub">
              {gameState === 'won' ?
            `Cleared in ${formatTime(time)} · ${totalMoves} moves` :
            'Better luck next time'}
            </div>
            <button className="overlay-btn" onClick={() => resetGame(difficulty)}>
              Play Again
            </button>
          </div>
        }
      </div>

      {/* Tweaks Panel */}
      {showTweaks &&
      <div className="tweaks-panel">
          <div className="tweaks-title">Tweaks</div>
          <div className="tweak-row">
            <span className="tweak-label">❓ Question marks</span>
            <button
            className={`tweak-toggle ${tweaks.questionMark ? 'on' : ''}`}
            onClick={() => updateTweak('questionMark', !tweaks.questionMark)} />
          
          </div>
          <div className="tweak-row">
            <span className="tweak-label">📍 Coordinates</span>
            <button
            className={`tweak-toggle ${tweaks.showCoords ? 'on' : ''}`}
            onClick={() => updateTweak('showCoords', !tweaks.showCoords)} />
          
          </div>
          <div className="tweak-row" style={{ flexDirection: 'column', alignItems: 'flex-start', gap: 6 }}>
            <span className="tweak-label">Cell size: {tweaks.cellSize}px</span>
            <input
            className="cell-size-slider"
            type="range" min={22} max={44} step={2}
            value={tweaks.cellSize}
            onChange={(e) => updateTweak('cellSize', Number(e.target.value))} />
          
          </div>
        </div>
      }
    </div>);

}

// ── Cell ──
function Cell({ cell, size, showCoords, onReveal, onFlag, onChord }) {
  const getContent = () => {
    if (cell.flagged) return <span className="flag-emoji">🚩</span>;
    if (cell.questioned) return <span style={{ color: '#f0a500', fontSize: 13 }}>?</span>;
    if (!cell.revealed) return showCoords ?
    <span style={{ fontSize: 7, color: '#2a3040' }}>{cell.row},{cell.col}</span> :
    null;
    if (cell.mine) return <span className="mine-emoji">💣</span>;
    if (cell.count === 0) return null;
    return <span className={NUM_COLORS[cell.count]}>{cell.count}</span>;
  };

  let cls = 'cell';
  if (!cell.revealed && !cell.flagged && !cell.questioned) cls += ' hidden';
  if (cell.revealed && !cell.mine) cls += ' revealed';
  if (cell.flagged) cls += ' flagged hidden';
  if (cell.questioned) cls += ' hidden';
  if (cell.hitMine) cls += ' mine-hit';
  if (cell.revealed && cell.mine && !cell.hitMine) cls += ' mine-shown';
  if (cell.wrongFlag) cls += ' wrong-flag';
  if (cell.justRevealed && !cell.mine) cls += ' just-revealed';

  return (
    <div
      className={cls}
      style={{ width: size, height: size, fontSize: size < 28 ? 10 : 12 }}
      onClick={cell.revealed ? onChord : onReveal}
      onContextMenu={onFlag}>
      
      {getContent()}
    </div>);

}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
